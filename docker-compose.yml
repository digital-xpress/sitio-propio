services:
  web:
    image: ghcr.io/digital-xpress/public-website:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: digitalxpress-website
    ports:
      - "3003:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.digitalxpress.service=public-website"
      - "com.digitalxpress.environment=production"
